version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: cookmate-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  ml-service:
    build: ./detection_service
    container_name: cookmate-ml
    ports:
      - "8000:8000"
    environment:
      MODEL_DIR: /app/models
      CONF_NANO: 0.30
      CONF_SMALL: 0.75
      IOU_NMS: 0.45
    volumes:
      - ./detection_service/models:/app/models
    healthcheck:
      test: [ "CMD", "python", "-c", "import requests; r = requests.get('http://localhost:8000/health'); exit(0 if r.status_code == 200 else 1)" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  backend:
    build: ./backend
    container_name: cookmate-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/cookmate
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      ML_SERVICE_URL: http://ml-service:8000
      SERVER_URL: ${SERVER_URL}
      GATEWAY_URL: ${GATEWAY_URL}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    depends_on:
      postgres:
        condition: service_healthy
      ml-service:
        condition: service_healthy

  gateway:
    build: ./Gateway
    container_name: cookmate-gateway
    ports:
      - "8090:8090"
    environment:
      BACKEND_SERVICE_URL: http://backend:8080
      PARSER_SERVICE_URL: http://parser:8082
      ML_SERVICE_URL: http://ml-service:8000
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    depends_on:
      - backend

  parser:
    build: ./Parser
    container_name: cookmate-parser
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/cookmate
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      CLOUD_AWS_S3_ENDPOINT: ${S3_ENDPOINT}
      CLOUD_AWS_S3_BUCKET: cookmate-images
      CLOUD_AWS_S3_REGION: ru-1
      CLOUD_AWS_CREDENTIALS_ACCESS_KEY: ${S3_ACCESS_KEY}
      CLOUD_AWS_CREDENTIALS_SECRET_KEY: ${S3_SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    dns:
      - 8.8.8.8 # Google DNS
      - 8.8.4.4 # Google DNS
      - 1.1.1.1 # Cloudflare DNS
      - 77.88.8.8 # Яндекс DNS
      - 77.88.8.1 # Яндекс DNS

volumes:
  postgres_data:
