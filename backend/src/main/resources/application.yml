server:
  port: 8080

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cookmate}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: false

  mail:
    host: smtp.yandex.ru
    port: 465
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
            trust: smtp.yandex.ru
          connectiontimeout: 30000
          timeout: 30000
          writetimeout: 30000

app:
  server-url: ${SERVER_URL:http://localhost:8080}
  gateway-url: ${GATEWAY_URL:http://localhost:8090}
  cors-allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:8080}

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    url: ${app.server-url}/v3/api-docs
    config-url: ${app.server-url}/v3/api-docs/swagger-config
    urls:
      - name: Backend API
        url: ${app.server-url}/v3/api-docs

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

ml:
  service:
    url: ${ML_SERVICE_URL:http://ml-service:8000}

logging:
  level:
    smartfridge: INFO