server:
  port: 8082

spring:
  application:
    name: parser-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cookmate}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

# S3 хранилище
cloud:
  aws:
    s3:
      endpoint: ${S3_ENDPOINT}
      region: ru-1
      bucket: cookmate-images

    credentials:
      access-key: ${S3_ACCESS_KEY}
      secret-key: ${S3_SECRET_KEY}

    stack:
      auto: false

# Логирование
logging:
  level:
    smartfridge.parser: INFO
    org.hibernate.SQL: WARN