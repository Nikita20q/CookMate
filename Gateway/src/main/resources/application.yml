spring:
  codec:
    max-in-memory-size: 10MB

  webflux:
    multipart:
      max-in-memory-size: 10MB
      max-disk-usage-per-request: 50MB

  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

      routes:
        - id: ml-service
          uri: http://localhost:8000
          predicates:
            - Path=/api/v1/recognize
          filters:
            - StripPrefix=1

        - id: backend-service
          uri: http://localhost:8080
          predicates:
            - Path=/api/v1/**