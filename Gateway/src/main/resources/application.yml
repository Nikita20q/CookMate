server:
  port: 8090

spring:
  codec:
    max-in-memory-size: ${MAX_MEMORY_SIZE:10MB}

  webflux:
    multipart:
      max-in-memory-size: ${MULTIPART_MAX_MEMORY:10MB}
      max-disk-usage-per-request: ${MULTIPART_MAX_DISK:50MB}

  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "${CORS_ALLOWED_ORIGINS:http://localhost:5173}"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

      routes:
        - id: backend-swagger
          uri: ${BACKEND_SERVICE_URL:http://localhost:8080}
          predicates:
            - Path=/swagger-ui/**,/v3/api-docs/**,/swagger-resources/**,/webjars/**

        - id: backend-auth
          uri: ${BACKEND_SERVICE_URL:http://localhost:8080}
          predicates:
            - Path=/api/v1/auth/**

        - id: parser-service
          uri: ${PARSER_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/parser/**

        - id: backend-service
          uri: ${BACKEND_SERVICE_URL:http://localhost:8080}
          predicates:
            - Path=/api/v1/recipes/**